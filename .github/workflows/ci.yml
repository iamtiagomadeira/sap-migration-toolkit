name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,tui]"
      - name: Ruff
        run: ruff check src/ tests/
      - name: Mypy
        run: mypy src/exodia
      - name: Pytest
        run: pytest --cov=exodia --cov-report=term-missing --cov-fail-under=78

  security:
    runs-on: ubuntu-latest
    # Non-blocking for now: surface findings without failing the build of other
    # PRs. Promote to blocking once a clean baseline is established.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,tui]"
          pip install bandit pip-audit
      - name: Bandit (static security analysis)
        run: bandit -r src/
      - name: pip-audit (dependency vulnerabilities)
        run: pip-audit
